const PAGE_SIZE = 50;
let page = 1;
let filtered = [...DATA];
let sortKey = 'fl';
let sortDir = 'desc';

function $(id){return document.getElementById(id)}

function getYear(dateStr) {
    if (!dateStr) return '2024';
    return dateStr.split('-')[0];
}

function activeText(d){
    if (d === undefined || d === null) return 'Unknown';
    return d <= 0 ? 'Today' : d === 1 ? '1d ago' : d < 30 ? d + 'd ago' : Math.floor(d / 30) + 'mo ago';
}

function setSort(key, dir){
    sortKey = key; sortDir = dir;
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    if(key==='fl') $('btn-fl').classList.add('active');
    if(key==='s') $('btn-s').classList.add('active');
    apply();
}

function apply(){
    const q = $('search').value.toLowerCase();
    filtered = DATA.filter(p => {
        const reason = p.reason || '';
        return (p.u + ' ' + (p.n||'') + ' ' + (p.b||'') + ' ' + reason).toLowerCase().includes(q);
    });
    
    filtered.sort((a,b) => {
        let v1, v2;
        if (sortKey === 's') {
            v1 = a.s === undefined ? 0 : a.s;
            v2 = b.s === undefined ? 0 : b.s;
            return sortDir === 'asc' ? v1 - v2 : v2 - v1;
        } else if (sortKey === 'year') {
            v1 = getYear(a.createdAt);
            v2 = getYear(b.createdAt);
        } else {
            v1 = a[sortKey]; v2 = b[sortKey];
        }
        
        if(typeof v1 === 'string') v1 = v1.toLowerCase();
        if(typeof v2 === 'string') v2 = v2.toLowerCase();
        if(v1 < v2) return sortDir === 'asc' ? -1 : 1;
        if(v1 > v2) return sortDir === 'asc' ? 1 : -1;
        return 0;
    });

    $('count').textContent = `Showing ${filtered.length} leads`;
    page = 1;
    render();
}

function render(){
    const start = (page-1)*PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const slice = filtered.slice(start, end);
    
    $('tbody').innerHTML = slice.map(p => {
        const reason = p.reason || '';
        const year = p.year || '2024';
        const score = p.s || 0;
        
        return `
            <tr>
                <td>
                    <div class="user-cell">
                        <div class="avatar-placeholder">${p.u[0].toUpperCase()}</div>
                        <div class="user-info">
                            <a href="https://x.com/${p.u}" target="_blank" class="user-link">@${p.u}</a>
                            <div class="user-name">${p.n}</div>
                        </div>
                    </div>
                </td>
                <td class="bio-cell">${p.b || ''}</td>
                <td class="reason-cell">${reason}</td>
                <td class="num">${(p.fl || 0).toLocaleString()}</td>
                <td class="num hide-mobile">${(p.tw || 0).toLocaleString()}</td>
                <td class="num hide-mobile">${year}</td>
                <td class="num">
                    <span style="color:${p.s > 0.8 ? '#66bb6a' : p.s > 0.5 ? '#ffa726' : '#ef5350'}; font-weight:bold">
                        ${(p.s).toFixed(0)}%
                    </span>
                </td>
            </tr>
        `;
    }).join('');
    
    renderPager();
}

function renderPager(){
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    const p = $('pagination');
    p.innerHTML = '';
    if(total <= 1) return;
    
    for(let i=1; i<=total; i++){
        if(i===1 || i===total || (i >= page-1 && i <= page+1)){
            const btn = document.createElement('button');
            btn.className = `page-btn ${i===page?'active':''}`;
            btn.textContent = i;
            btn.onclick = () => { page=i; render(); window.scrollTo(0,0); };
            p.appendChild(btn);
        } else if (i === page-2 || i === page+2) {
            const span = document.createElement('span');
            span.textContent = '...';
            span.style.color = '#444';
            p.appendChild(span);
        }
    }
}

$('search').oninput = apply;
document.querySelectorAll('th[data-col]').forEach(th => {
    th.onclick = () => {
        const k = th.dataset.col;
        if(sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortKey = k; sortDir = 'desc'; }
        
        document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
        th.classList.add(sortDir==='asc'?'sorted-asc':'sorted-desc');
        apply();
    };
});

setSort('fl', 'desc');
</script>

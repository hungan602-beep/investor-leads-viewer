<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Export: 800 High-Confidence Leads</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .lead-card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; display: flex; gap: 20px; }
        .lead-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #38bdf8; }
        .lead-info { flex: 1; }
        .lead-name { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .lead-handle { color: #38bdf8; font-size: 0.9rem; margin-bottom: 5px; }
        .lead-bio { color: #94a3b8; font-size: 0.85rem; margin-bottom: 10px; }
        .lead-stats { display: flex; gap: 15px; font-size: 0.8rem; color: #cbd5e1; }
        .lead-reason { background: #0f172a; padding: 10px; border-radius: 6px; font-size: 0.8rem; border-left: 4px solid #10b981; margin-top: 10px; }
        .label { font-weight: bold; color: #888; text-transform: uppercase; font-size: 0.7rem; }
        .search-container { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Final Human Leads (DeepSeek-V3 Validated)</h1>
        <p>800 profiles identified as high-confidence humans</p>
    </div>
    <div id="leadsList">
    <!-- Leads populated via automated export -->
    </div>
</body>
</html>
